name: Android TV Release

on:
  push:
    tags:
      - 'tv-v*'

defaults:
  run:
    working-directory: apps/android-tv

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permissions to gradlew
        run: chmod +x gradlew

      - name: Resolve release metadata
        id: release_meta
        run: |
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          VERSION_NAME=$(./gradlew -q app:printVersionName)
          RELEASE_NAME=$(./gradlew -q app:printSentryRelease -PcybervpnVersionCode="${BUILD_NUMBER}")
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "release=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Summarize Android TV release metadata
        env:
          SENTRY_PROJECT: ${{ vars.ANDROID_TV_SENTRY_PROJECT || vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ steps.release_meta.outputs.release }}
          SENTRY_UPLOAD_ENABLED: ${{ secrets.SENTRY_AUTH_TOKEN != '' && vars.SENTRY_ORG != '' && (vars.ANDROID_TV_SENTRY_PROJECT != '' || vars.SENTRY_PROJECT != '') && 'true' || 'false' }}
        run: |
          {
            echo "### Android TV release metadata"
            echo "- Environment: \`production\`"
            echo "- Release: \`${SENTRY_RELEASE}\`"
            echo "- Project: \`${SENTRY_PROJECT:-unconfigured}\`"
            echo "- Mapping upload enabled: \`${SENTRY_UPLOAD_ENABLED}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Linters & Tests
        env:
          SENTRY_ENVIRONMENT: production
          SENTRY_DSN: ${{ secrets.ANDROID_TV_SENTRY_DSN }}
          SENTRY_RELEASE: ${{ steps.release_meta.outputs.release }}
        run: |
          ./gradlew detekt ktlintCheck testReleaseUnitTest \
            -PcybervpnVersionCode="${{ steps.release_meta.outputs.build_number }}"

      - name: Build AAB and APK
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.ANDROID_TV_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          ANDROID_TV_SENTRY_PROJECT: ${{ vars.ANDROID_TV_SENTRY_PROJECT || vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ steps.release_meta.outputs.release }}
          SENTRY_URL: ${{ vars.SENTRY_URL }}
        run: |
          ./gradlew bundleRelease assembleRelease \
            -PcybervpnVersionCode="${{ steps.release_meta.outputs.build_number }}"

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-release-mapping
          path: apps/android-tv/app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: error

      - name: Collect Android TV Sentry release evidence
        env:
          SENTRY_PROJECT: ${{ vars.ANDROID_TV_SENTRY_PROJECT || vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ steps.release_meta.outputs.release }}
        run: |
          python ../../scripts/collect-sentry-release-evidence.py \
            --surface android-tv \
            --release "${SENTRY_RELEASE}" \
            --environment production \
            --project "${SENTRY_PROJECT:-unconfigured}" \
            --proof-scope release_workflow \
            --deploy-marker-mode release_workflow \
            --artifact "android-tv-apk=app/build/outputs/apk/release/app-release-unsigned.apk" \
            --artifact "android-tv-aab=app/build/outputs/bundle/release/app-release.aab" \
            --artifact "android-tv-mapping=app/build/outputs/mapping/release/mapping.txt" \
            --output build/sentry-proof/android-tv-release.json \
            --summary-label "Android TV Sentry proof"

      - name: Upload Android TV Sentry proof manifest
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-sentry-proof
          path: apps/android-tv/build/sentry-proof/android-tv-release.json
          retention-days: 90
          if-no-files-found: error

      - name: Create Release and Upload Artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            apps/android-tv/app/build/outputs/apk/release/app-release-unsigned.apk
            apps/android-tv/app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Record Sentry deploy marker
        env:
          SENTRY_PROJECT: ${{ vars.ANDROID_TV_SENTRY_PROJECT || vars.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ steps.release_meta.outputs.release }}
        run: |
          python ../../scripts/record-sentry-release-deploy.py \
            --release "${SENTRY_RELEASE}" \
            --environment production \
            --project "${SENTRY_PROJECT:-unconfigured}" \
            --deploy-name android-tv-release \
            --deploy-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --release-url "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" \
            --summary-label "Android TV Sentry deploy marker" \
            --finalize \
            --noop-on-missing-config
