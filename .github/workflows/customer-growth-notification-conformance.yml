name: Customer Growth Notification Conformance

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'admin/**'
      - 'frontend/**'
      - 'infra/**'
      - 'scripts/run-customer-growth-notification-conformance.sh'
      - 'scripts/bootstrap-customer-growth-notification-evidence.sh'
      - 'scripts/run-customer-growth-notification-staging-smoke.sh'
      - 'scripts/sync-customer-growth-notification-ruleset.sh'
      - 'package.json'
      - 'package-lock.json'
      - 'docs/runbooks/CUSTOMER_GROWTH_NOTIFICATION_DELIVERY_RUNBOOK.md'
      - 'docs/runbooks/CUSTOMER_GROWTH_NOTIFICATION_STAGING_ROLLOUT_RUNBOOK.md'
      - 'docs/runbooks/CUSTOMER_GROWTH_NOTIFICATION_GITHUB_PROTECTION_HANDOFF.md'
      - 'docs/InviteRefferalPartnersPromo-codes/2026-04-21-growth-codes-implementation-plan.md'
      - 'docs/InviteRefferalPartnersPromo-codes/2026-04-21-customer-growth-codes-package-index.md'
      - '.github/rulesets/customer-growth-notification-main-gate.disabled.json'
      - '.github/workflows/customer-growth-notification-conformance.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'admin/**'
      - 'frontend/**'
      - 'infra/**'
      - 'scripts/run-customer-growth-notification-conformance.sh'
      - 'scripts/bootstrap-customer-growth-notification-evidence.sh'
      - 'scripts/run-customer-growth-notification-staging-smoke.sh'
      - 'scripts/sync-customer-growth-notification-ruleset.sh'
      - 'package.json'
      - 'package-lock.json'
      - 'docs/runbooks/CUSTOMER_GROWTH_NOTIFICATION_DELIVERY_RUNBOOK.md'
      - 'docs/runbooks/CUSTOMER_GROWTH_NOTIFICATION_STAGING_ROLLOUT_RUNBOOK.md'
      - 'docs/runbooks/CUSTOMER_GROWTH_NOTIFICATION_GITHUB_PROTECTION_HANDOFF.md'
      - 'docs/InviteRefferalPartnersPromo-codes/2026-04-21-growth-codes-implementation-plan.md'
      - 'docs/InviteRefferalPartnersPromo-codes/2026-04-21-customer-growth-codes-package-index.md'
      - '.github/rulesets/customer-growth-notification-main-gate.disabled.json'
      - '.github/workflows/customer-growth-notification-conformance.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-conformance:
    name: Backend Growth Notification Conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run backend conformance
        env:
          SKIP_TEST_DB_BOOTSTRAP: '1'
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          set -o pipefail
          bash scripts/run-customer-growth-notification-conformance.sh --backend |& tee .ci-artifacts/backend-growth-notification.log

      - name: Upload backend conformance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-growth-notification-backend-${{ github.run_id }}
          path: .ci-artifacts/backend-growth-notification.log
          if-no-files-found: error

  frontend-conformance:
    name: Frontend Growth Notification Conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run frontend conformance
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          set -o pipefail
          bash scripts/run-customer-growth-notification-conformance.sh --frontend |& tee .ci-artifacts/frontend-growth-notification.log

      - name: Upload frontend conformance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-growth-notification-frontend-${{ github.run_id }}
          path: .ci-artifacts/frontend-growth-notification.log
          if-no-files-found: error

  admin-conformance:
    name: Admin Growth Notification Conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run admin conformance
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          set -o pipefail
          bash scripts/run-customer-growth-notification-conformance.sh --admin |& tee .ci-artifacts/admin-growth-notification.log

      - name: Upload admin conformance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-growth-notification-admin-${{ github.run_id }}
          path: .ci-artifacts/admin-growth-notification.log
          if-no-files-found: error

  assets-conformance:
    name: Growth Notification Rollout Assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install workspace dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run asset conformance
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          set -o pipefail
          bash scripts/run-customer-growth-notification-conformance.sh --assets |& tee .ci-artifacts/assets-growth-notification.log

      - name: Upload assets conformance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: customer-growth-notification-assets-${{ github.run_id }}
          path: .ci-artifacts/assets-growth-notification.log
          if-no-files-found: error

  all-checks:
    name: All Customer Growth Notification Checks Passed
    runs-on: ubuntu-latest
    needs:
      - backend-conformance
      - frontend-conformance
      - admin-conformance
      - assets-conformance
    if: always()
    steps:
      - name: Check all jobs
        env:
          BACKEND_RESULT: ${{ needs.backend-conformance.result }}
          FRONTEND_RESULT: ${{ needs.frontend-conformance.result }}
          ADMIN_RESULT: ${{ needs.admin-conformance.result }}
          ASSETS_RESULT: ${{ needs.assets-conformance.result }}
        run: |
          if [[ "$BACKEND_RESULT" != "success" ]]; then
            echo "Backend growth notification conformance failed"
            exit 1
          fi
          if [[ "$FRONTEND_RESULT" != "success" ]]; then
            echo "Frontend growth notification conformance failed"
            exit 1
          fi
          if [[ "$ADMIN_RESULT" != "success" ]]; then
            echo "Admin growth notification conformance failed"
            exit 1
          fi
          if [[ "$ASSETS_RESULT" != "success" ]]; then
            echo "Growth notification rollout assets failed"
            exit 1
          fi
          echo "All customer growth notification checks passed"

      - name: Write summary
        run: |
          {
            echo "## Customer Growth Notification Required Check"
            echo
            echo "- Workflow: \`Customer Growth Notification Conformance\`"
            echo "- Required status check: \`All Customer Growth Notification Checks Passed\`"
            echo "- Backend log artifact: \`customer-growth-notification-backend-${{ github.run_id }}\`"
            echo "- Frontend log artifact: \`customer-growth-notification-frontend-${{ github.run_id }}\`"
            echo "- Admin log artifact: \`customer-growth-notification-admin-${{ github.run_id }}\`"
            echo "- Assets log artifact: \`customer-growth-notification-assets-${{ github.run_id }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
