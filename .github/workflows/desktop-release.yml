name: "Desktop Release"

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
          components: clippy, rustfmt

      - name: Install Dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        working-directory: ./apps/desktop-client
        run: npm ci || npm install

      - name: Cargo Fmt Check
        working-directory: ./apps/desktop-client/src-tauri
        run: cargo fmt --check

      - name: Cargo Clippy Check
        working-directory: ./apps/desktop-client/src-tauri
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Cargo Test
        working-directory: ./apps/desktop-client/src-tauri
        run: cargo test

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ""
          APPLE_CERTIFICATE_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ""
          APPLE_ID: ""
          APPLE_PASSWORD: ""
        with:
          tagName: desktop-v__VERSION__ 
          releaseName: "CyberVPN Desktop v__VERSION__"
          releaseBody: "See the assets below to download and install CyberVPN Desktop."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
