name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  generated-artifacts:
    name: Generated Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check generated API types and i18n bundles
        run: |
          npm run generate:api-types
          npm run prepare:i18n
          git diff --exit-code -- src/lib/api/generated/types.ts src/i18n/messages/generated

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        run: npx vitest run --reporter=verbose --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          file: frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [generated-artifacts, lint, typecheck, test]
    env:
      APP_ENV: staging
      NEXT_PUBLIC_APP_ENV: staging
      SENTRY_DSN: https://frontend-server@example.com/1
      NEXT_PUBLIC_SENTRY_DSN: https://frontend-public@example.com/1
      SENTRY_RELEASE: frontend@${{ github.sha }}
      NEXT_PUBLIC_SENTRY_RELEASE: frontend@${{ github.sha }}
      FRONTEND_OBSERVABILITY_INTERNAL_SECRET: frontend-smoke-secret
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Validate Sentry contract
        run: |
          python3 ../scripts/validate-sentry-contract.py \
            --surface frontend \
            --environment-var APP_ENV \
            --release-var SENTRY_RELEASE \
            --dsn-var SENTRY_DSN \
            --expected-environment staging \
            --expected-release frontend@${{ github.sha }} \
            --require-dsn \
            --summary-label "Frontend Sentry contract"

      - name: Start Next.js for smoke validation
        run: |
          nohup npm run start -- --hostname 127.0.0.1 --port 3000 \
            > /tmp/frontend-sentry-smoke.log 2>&1 &
          echo $! > /tmp/frontend-sentry-smoke.pid

      - name: Run HTTP smoke validation
        run: |
          python3 ../scripts/http-smoke-check.py \
            --url http://127.0.0.1:3000/en-EN \
            --expect-status 200 \
            --summary-label "Frontend page smoke"
          python3 ../scripts/http-smoke-check.py \
            --url http://127.0.0.1:3000/api/observability/sentry-contract \
            --header "x-observability-secret: ${FRONTEND_OBSERVABILITY_INTERNAL_SECRET}" \
            --expect-status 200 \
            --expect-json-field runtimeSurface=frontend \
            --expect-json-field environment=staging \
            --expect-json-field release=frontend@${{ github.sha }} \
            --expect-json-field dsnConfigured=true \
            --expect-json-field publicDsnConfigured=true \
            --summary-label "Frontend Sentry runtime smoke"

      - name: Stop Next.js smoke server
        if: always()
        run: |
          if [ -f /tmp/frontend-sentry-smoke.pid ]; then
            kill "$(cat /tmp/frontend-sentry-smoke.pid)" || true
          fi

  all-checks:
    name: All Frontend Checks Passed
    runs-on: ubuntu-latest
    needs: [generated-artifacts, lint, typecheck, test, build]
    if: always()
    steps:
      - name: Check all jobs
        env:
          GENERATED_RESULT: ${{ needs.generated-artifacts.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          if [[ "$GENERATED_RESULT" != "success" ]] || \
             [[ "$LINT_RESULT" != "success" ]] || \
             [[ "$TYPECHECK_RESULT" != "success" ]] || \
             [[ "$TEST_RESULT" != "success" ]] || \
             [[ "$BUILD_RESULT" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All frontend checks passed"
