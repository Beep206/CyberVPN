name: Node Fleet Controller CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'services/node-fleet-controller/**'
      - '.github/workflows/node-fleet-controller-ci.yml'
  pull_request:
    paths:
      - 'services/node-fleet-controller/**'
      - '.github/workflows/node-fleet-controller-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: services/node-fleet-controller

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'
          cache: pip
          cache-dependency-path: services/node-fleet-controller/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff check
        run: |
          ruff check \
            src/config.py \
            src/main.py \
            src/observability.py \
            src/api/router.py \
            src/application/services/workflow_engine.py \
            src/application/services/reconciler.py \
            tests/test_observability.py \
            --ignore S104,S105,S106

      - name: Run ruff format check
        run: |
          ruff format --check \
            src/config.py \
            src/main.py \
            src/observability.py \
            src/api/router.py \
            src/application/services/workflow_engine.py \
            src/application/services/reconciler.py \
            tests/test_observability.py

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'
          cache: pip
          cache-dependency-path: services/node-fleet-controller/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/test_observability.py tests/test_workflow_engine.py tests/test_reconciler.py -v --tb=short

      - name: Run compile pass
        run: python3 -m py_compile src/config.py src/main.py src/observability.py src/api/router.py tests/test_observability.py

      - name: Validate Sentry contract
        env:
          ENVIRONMENT: staging
          SENTRY_DSN: https://fleet-controller@example.com/1
          SENTRY_RELEASE: node-fleet-controller@${{ github.sha }}
        run: |
          python3 ../../scripts/validate-sentry-contract.py \
            --surface node-fleet-controller \
            --environment-var ENVIRONMENT \
            --release-var SENTRY_RELEASE \
            --dsn-var SENTRY_DSN \
            --expected-environment staging \
            --expected-release node-fleet-controller@${{ github.sha }} \
            --require-dsn \
            --summary-label "Node fleet controller Sentry contract"

      - name: Start controller for Sentry smoke validation
        env:
          ENVIRONMENT: staging
          SENTRY_DSN: https://fleet-controller@example.com/1
          SENTRY_RELEASE: node-fleet-controller@${{ github.sha }}
          FLEET_CONTROLLER_OBSERVABILITY_INTERNAL_SECRET: fleet-controller-smoke-secret
        run: |
          nohup python3 -m uvicorn src.main:app --host 127.0.0.1 --port 8085 \
            > /tmp/node-fleet-controller-sentry-smoke.log 2>&1 &
          echo $! > /tmp/node-fleet-controller-sentry-smoke.pid

      - name: Run HTTP smoke validation
        run: |
          python3 ../../scripts/http-smoke-check.py \
            --url http://127.0.0.1:8085/api/v1/health/live \
            --expect-status 200 \
            --expect-json-field status=ok \
            --expect-json-field service=cybervpn-node-fleet-controller \
            --expect-json-field environment=staging \
            --summary-label "Node fleet controller health smoke"
          python3 ../../scripts/http-smoke-check.py \
            --url http://127.0.0.1:8085/api/v1/observability/sentry-contract \
            --header "x-observability-secret: fleet-controller-smoke-secret" \
            --expect-status 200 \
            --expect-json-field runtime_surface=node-fleet-controller \
            --expect-json-field service=cybervpn-node-fleet-controller \
            --expect-json-field environment=staging \
            --expect-json-field release=node-fleet-controller@${{ github.sha }} \
            --expect-json-field dsn_configured=true \
            --summary-label "Node fleet controller Sentry runtime smoke"

      - name: Stop controller smoke server
        if: always()
        run: |
          if [ -f /tmp/node-fleet-controller-sentry-smoke.pid ]; then
            kill "$(cat /tmp/node-fleet-controller-sentry-smoke.pid)" || true
          fi

  all-checks:
    name: All Node Fleet Controller Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check all jobs
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          if [[ "$LINT_RESULT" != "success" ]] || [[ "$TEST_RESULT" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All node fleet controller checks passed"
