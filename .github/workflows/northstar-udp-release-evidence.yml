name: northstar-udp-release-evidence

on:
  pull_request:
    branches:
      - "release/**"
      - "rc/**"
    paths:
      - "packages/northstar-protocol/**"
      - ".github/workflows/northstar-udp-bounded-verification.yml"
      - ".github/workflows/northstar-udp-scheduled-verification.yml"
      - ".github/workflows/northstar-udp-release-evidence.yml"
  push:
    branches:
      - "release/**"
      - "rc/**"
    paths:
      - "packages/northstar-protocol/**"
      - ".github/workflows/northstar-udp-bounded-verification.yml"
      - ".github/workflows/northstar-udp-scheduled-verification.yml"
      - ".github/workflows/northstar-udp-release-evidence.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: northstar-udp-release-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: packages/northstar-protocol
    env:
      NORTHSTAR_UDP_FUZZ_SMOKE_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-linux.json
      NORTHSTAR_UDP_PERF_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-perf-gate-summary-linux.json
      NORTHSTAR_UDP_INTEROP_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-interop-lab-summary-linux.json
      NORTHSTAR_UDP_ROLLOUT_VALIDATION_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-linux.json
      NORTHSTAR_UDP_ROLLOUT_COMPARISON_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-linux.json
      NORTHSTAR_UDP_INTEROP_CATALOG_HOST_LABEL: linux
      NORTHSTAR_UDP_INTEROP_CATALOG_SOURCE_LANE: compatible_host_interop_lab
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Linux rollout-readiness evidence
        run: |
          bash scripts/udp-rollout-readiness.sh
          cargo run -p ns-testkit --example udp_interop_lab -- --list --format json > target/northstar/udp-interop-profile-catalog-linux.json

      - name: Upload Linux readiness evidence
        uses: actions/upload-artifact@v4
        with:
          name: northstar-release-evidence-linux-readiness
          retention-days: 30
          path: |
            packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-linux.json
            packages/northstar-protocol/target/northstar/udp-perf-gate-summary-linux.json
            packages/northstar-protocol/target/northstar/udp-interop-lab-summary-linux.json
            packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-linux.json
            packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-linux.json
            packages/northstar-protocol/target/northstar/udp-interop-profile-catalog-linux.json

  linux-staged-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: packages/northstar-protocol
    env:
      NORTHSTAR_ENABLE_UDP_ACTIVE_FUZZ: "1"
      NORTHSTAR_UDP_ROLLOUT_COMPARE_PROFILE: staged_rollout
      NORTHSTAR_UDP_FUZZ_SMOKE_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-linux-staged.json
      NORTHSTAR_UDP_PERF_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-perf-gate-summary-linux-staged.json
      NORTHSTAR_UDP_INTEROP_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-interop-lab-summary-linux-staged.json
      NORTHSTAR_UDP_ROLLOUT_VALIDATION_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-linux-staged.json
      NORTHSTAR_UDP_ACTIVE_FUZZ_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-active-fuzz-summary-linux-staged.json
      NORTHSTAR_UDP_ROLLOUT_COMPARISON_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-linux-staged.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Linux staged-rollout evidence
        run: bash scripts/udp-rollout-readiness.sh

      - name: Upload Linux staged evidence
        uses: actions/upload-artifact@v4
        with:
          name: northstar-release-evidence-linux-staged
          retention-days: 30
          path: |
            packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-linux-staged.json
            packages/northstar-protocol/target/northstar/udp-perf-gate-summary-linux-staged.json
            packages/northstar-protocol/target/northstar/udp-interop-lab-summary-linux-staged.json
            packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-linux-staged.json
            packages/northstar-protocol/target/northstar/udp-active-fuzz-summary-linux-staged.json
            packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-linux-staged.json

  macos-readiness:
    runs-on: macos-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: packages/northstar-protocol
    env:
      NORTHSTAR_UDP_FUZZ_SMOKE_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-macos.json
      NORTHSTAR_UDP_PERF_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-perf-gate-summary-macos.json
      NORTHSTAR_UDP_INTEROP_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-interop-lab-summary-macos.json
      NORTHSTAR_UDP_ROLLOUT_VALIDATION_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-macos.json
      NORTHSTAR_UDP_ROLLOUT_COMPARISON_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-macos.json
      NORTHSTAR_UDP_INTEROP_CATALOG_HOST_LABEL: macos
      NORTHSTAR_UDP_INTEROP_CATALOG_SOURCE_LANE: compatible_host_interop_lab
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run macOS rollout-readiness evidence
        run: |
          bash scripts/udp-rollout-readiness.sh
          cargo run -p ns-testkit --example udp_interop_lab -- --list --format json > target/northstar/udp-interop-profile-catalog-macos.json

      - name: Upload macOS readiness evidence
        uses: actions/upload-artifact@v4
        with:
          name: northstar-release-evidence-macos-readiness
          retention-days: 30
          path: |
            packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-macos.json
            packages/northstar-protocol/target/northstar/udp-perf-gate-summary-macos.json
            packages/northstar-protocol/target/northstar/udp-interop-lab-summary-macos.json
            packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-macos.json
            packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-macos.json
            packages/northstar-protocol/target/northstar/udp-interop-profile-catalog-macos.json

  macos-staged-readiness:
    runs-on: macos-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: packages/northstar-protocol
    env:
      NORTHSTAR_ENABLE_UDP_ACTIVE_FUZZ: "1"
      NORTHSTAR_UDP_ROLLOUT_COMPARE_PROFILE: staged_rollout
      NORTHSTAR_UDP_FUZZ_SMOKE_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-macos-staged.json
      NORTHSTAR_UDP_PERF_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-perf-gate-summary-macos-staged.json
      NORTHSTAR_UDP_INTEROP_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-interop-lab-summary-macos-staged.json
      NORTHSTAR_UDP_ROLLOUT_VALIDATION_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-macos-staged.json
      NORTHSTAR_UDP_ACTIVE_FUZZ_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-active-fuzz-summary-macos-staged.json
      NORTHSTAR_UDP_ROLLOUT_COMPARISON_SUMMARY_PATH: ${{ github.workspace }}/packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-macos-staged.json
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust nightly toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run macOS staged-rollout evidence
        run: bash scripts/udp-rollout-readiness.sh

      - name: Upload macOS staged evidence
        uses: actions/upload-artifact@v4
        with:
          name: northstar-release-evidence-macos-staged
          retention-days: 30
          path: |
            packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-macos-staged.json
            packages/northstar-protocol/target/northstar/udp-perf-gate-summary-macos-staged.json
            packages/northstar-protocol/target/northstar/udp-interop-lab-summary-macos-staged.json
            packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-macos-staged.json
            packages/northstar-protocol/target/northstar/udp-active-fuzz-summary-macos-staged.json
            packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-macos-staged.json

  windows-readiness:
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: packages/northstar-protocol
        shell: pwsh
    env:
      NORTHSTAR_UDP_FUZZ_SMOKE_SUMMARY_PATH: ${{ github.workspace }}\packages\northstar-protocol\target\northstar\udp-fuzz-smoke-summary-windows.json
      NORTHSTAR_UDP_PERF_SUMMARY_PATH: ${{ github.workspace }}\packages\northstar-protocol\target\northstar\udp-perf-gate-summary-windows.json
      NORTHSTAR_UDP_INTEROP_SUMMARY_PATH: ${{ github.workspace }}\packages\northstar-protocol\target\northstar\udp-interop-lab-summary-windows.json
      NORTHSTAR_UDP_ROLLOUT_VALIDATION_SUMMARY_PATH: ${{ github.workspace }}\packages\northstar-protocol\target\northstar\udp-rollout-validation-summary-windows.json
      NORTHSTAR_UDP_ROLLOUT_COMPARISON_SUMMARY_PATH: ${{ github.workspace }}\packages\northstar-protocol\target\northstar\udp-rollout-comparison-summary-windows.json
      NORTHSTAR_UDP_INTEROP_CATALOG_HOST_LABEL: windows
      NORTHSTAR_UDP_INTEROP_CATALOG_SOURCE_LANE: compatible_host_interop_lab
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run Windows rollout-readiness evidence
        run: |
          .\scripts\udp-rollout-readiness.ps1
          cargo run -p ns-testkit --example udp_interop_lab -- --list --format json | Set-Content -Encoding utf8NoBOM -Path target\northstar\udp-interop-profile-catalog-windows.json

      - name: Upload Windows readiness evidence
        uses: actions/upload-artifact@v4
        with:
          name: northstar-release-evidence-windows-readiness
          retention-days: 30
          path: |
            packages/northstar-protocol/target/northstar/udp-fuzz-smoke-summary-windows.json
            packages/northstar-protocol/target/northstar/udp-perf-gate-summary-windows.json
            packages/northstar-protocol/target/northstar/udp-interop-lab-summary-windows.json
            packages/northstar-protocol/target/northstar/udp-rollout-validation-summary-windows.json
            packages/northstar-protocol/target/northstar/udp-rollout-comparison-summary-windows.json
            packages/northstar-protocol/target/northstar/udp-interop-profile-catalog-windows.json

  release-evidence-chain:
    runs-on: ubuntu-latest
    needs:
      - linux-readiness
      - linux-staged-readiness
      - macos-readiness
      - macos-staged-readiness
      - windows-readiness
    timeout-minutes: 120
    defaults:
      run:
        working-directory: packages/northstar-protocol
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Download release evidence inputs
        uses: actions/download-artifact@v4
        with:
          path: packages/northstar-protocol/target/northstar
          merge-multiple: true
          pattern: northstar-release-evidence-*

      - name: Run release evidence chain
        run: bash scripts/udp-release-evidence-chain.sh

      - name: Record release-evidence environment metadata
        run: |
          cat > target/northstar/udp-release-evidence-environment.json <<EOF
          {
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "job": "${{ github.job }}",
            "os": "${{ runner.os }}",
            "runner": "${{ runner.name }}",
            "arch": "${{ runner.arch }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}"
          }
          EOF

      - name: Upload release evidence outputs
        uses: actions/upload-artifact@v4
        with:
          name: northstar-release-evidence-chain
          retention-days: 30
          path: |
            packages/northstar-protocol/target/northstar/udp-rollout-matrix-summary.json
            packages/northstar-protocol/target/northstar/udp-rollout-matrix-summary-staged.json
            packages/northstar-protocol/target/northstar/udp-release-workflow-summary.json
            packages/northstar-protocol/target/northstar/udp-deployment-signoff-summary.json
            packages/northstar-protocol/target/northstar/udp-release-prep-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-signoff-summary.json
            packages/northstar-protocol/target/northstar/udp-release-burn-in-summary.json
            packages/northstar-protocol/target/northstar/udp-release-soak-summary.json
            packages/northstar-protocol/target/northstar/udp-release-gate-summary.json
            packages/northstar-protocol/target/northstar/udp-release-readiness-burndown-summary.json
            packages/northstar-protocol/target/northstar/udp-release-stability-signoff-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-consolidation-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-hardening-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-evidence-freeze-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-signoff-closure-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-stabilization-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-readiness-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-acceptance-summary.json
            packages/northstar-protocol/target/northstar/udp-release-candidate-certification-summary.json
            packages/northstar-protocol/target/northstar/udp-release-evidence-environment.json
