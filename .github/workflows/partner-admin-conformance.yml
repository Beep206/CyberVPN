name: Partner Admin Conformance

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'admin/**'
      - 'partner/**'
      - 'scripts/run-partner-admin-conformance.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/partner-admin-conformance.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'admin/**'
      - 'partner/**'
      - 'scripts/run-partner-admin-conformance.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/partner-admin-conformance.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-conformance:
    name: Backend Conformance Pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run backend partner/admin conformance
        env:
          SKIP_TEST_DB_BOOTSTRAP: '1'
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          set -o pipefail
          bash scripts/run-partner-admin-conformance.sh --backend |& tee .ci-artifacts/backend-conformance.log

      - name: Upload backend conformance log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partner-admin-backend-${{ github.run_id }}
          path: .ci-artifacts/backend-conformance.log
          if-no-files-found: error

  admin-surface:
    name: Admin Surface Readiness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run admin conformance surface checks
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          set -o pipefail
          bash scripts/run-partner-admin-conformance.sh --admin |& tee .ci-artifacts/admin-surface.log

      - name: Upload admin surface log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partner-admin-surface-${{ github.run_id }}
          path: .ci-artifacts/admin-surface.log
          if-no-files-found: error

  partner-surface:
    name: Partner Surface Readiness
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Run partner conformance surface checks
        env:
          NEXT_TELEMETRY_DISABLED: '1'
        shell: bash
        run: |
          mkdir -p .ci-artifacts
          set -o pipefail
          bash scripts/run-partner-admin-conformance.sh --partner |& tee .ci-artifacts/partner-surface.log

      - name: Upload partner surface log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: partner-admin-partner-${{ github.run_id }}
          path: .ci-artifacts/partner-surface.log
          if-no-files-found: error

  all-checks:
    name: All Partner/Admin Checks Passed
    runs-on: ubuntu-latest
    needs:
      - backend-conformance
      - admin-surface
      - partner-surface
    if: always()
    steps:
      - name: Check all jobs
        env:
          BACKEND_RESULT: ${{ needs.backend-conformance.result }}
          ADMIN_RESULT: ${{ needs.admin-surface.result }}
          PARTNER_RESULT: ${{ needs.partner-surface.result }}
        run: |
          if [[ "$BACKEND_RESULT" != "success" ]]; then
            echo "Backend conformance failed"
            exit 1
          fi
          if [[ "$ADMIN_RESULT" != "success" ]]; then
            echo "Admin surface readiness failed"
            exit 1
          fi
          if [[ "$PARTNER_RESULT" != "success" ]]; then
            echo "Partner surface readiness failed"
            exit 1
          fi
          echo "All partner/admin conformance checks passed"

      - name: Write branch protection handoff summary
        run: |
          {
            echo "## Partner/Admin Required Check"
            echo
            echo "- Workflow: \`Partner Admin Conformance\`"
            echo "- Required status check: \`All Partner/Admin Checks Passed\`"
            echo "- Backend log artifact: \`partner-admin-backend-${{ github.run_id }}\`"
            echo "- Admin log artifact: \`partner-admin-surface-${{ github.run_id }}\`"
            echo "- Partner log artifact: \`partner-admin-partner-${{ github.run_id }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
