name: Production Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Strict IPC & Clippy Audit
        working-directory: ./apps/desktop-client/src-tauri
        run: |
          cargo clippy --all-targets --all-features --locked -- -D warnings
      
      - name: Build Tauri Binary
        working-directory: ./apps/desktop-client
        run: |
          npm ci
          npm run tauri build
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cybervpn-linux-binary
          path: apps/desktop-client/src-tauri/target/release/bundle/
