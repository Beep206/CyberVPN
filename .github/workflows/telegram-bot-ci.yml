name: Telegram Bot CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'services/telegram-bot/**'
      - '.github/workflows/telegram-bot-ci.yml'
  pull_request:
    paths:
      - 'services/telegram-bot/**'
      - '.github/workflows/telegram-bot-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'
          cache: pip
          cache-dependency-path: services/telegram-bot/pyproject.toml

      - name: Install dependencies
        working-directory: services/telegram-bot
        run: pip install -e ".[dev]"

      - name: Run ruff check
        working-directory: services/telegram-bot
        run: ruff check src/config.py src/main.py tests/unit/test_main.py

      - name: Run ruff format check
        working-directory: services/telegram-bot
        run: ruff format --check src/config.py src/main.py tests/unit/test_main.py

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'
          cache: pip
          cache-dependency-path: services/telegram-bot/pyproject.toml

      - name: Install dependencies
        working-directory: services/telegram-bot
        run: pip install -e ".[dev]"

      - name: Run compile pass
        working-directory: services/telegram-bot
        run: python3 -m py_compile src/config.py src/main.py tests/unit/test_main.py

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.13'
          cache: pip
          cache-dependency-path: services/telegram-bot/pyproject.toml

      - name: Install dependencies
        working-directory: services/telegram-bot
        run: pip install -e ".[test]"

      - name: Run Telegram bot Sentry unit tests
        working-directory: services/telegram-bot
        run: |
          pytest \
            tests/test_fixtures.py \
            tests/unit/test_main.py \
            -v --tb=short

      - name: Validate Sentry contract
        working-directory: services/telegram-bot
        env:
          ENVIRONMENT: staging
          SENTRY_DSN: https://telegram@example.com/1
          SENTRY_RELEASE: telegram-bot@${{ github.sha }}
        run: |
          python3 ../../scripts/validate-sentry-contract.py \
            --surface telegram-bot \
            --environment-var ENVIRONMENT \
            --release-var SENTRY_RELEASE \
            --dsn-var SENTRY_DSN \
            --expected-environment staging \
            --expected-release telegram-bot@${{ github.sha }} \
            --require-dsn \
            --summary-label "Telegram bot Sentry contract"

      - name: Run Telegram bot Sentry config smoke tests
        working-directory: services/telegram-bot
        env:
          BOT_TOKEN: 1234567890:ABCdefGHIjklMNOpqrsTUVwxyz
          BOT_MODE: polling
          ENVIRONMENT: staging
          SENTRY_DSN: https://telegram@example.com/1
          SENTRY_RELEASE: telegram-bot@${{ github.sha }}
          BACKEND_API_URL: https://api.test.cybervpn.local
          BACKEND_API_KEY: test_api_key_12345
          CRYPTOBOT_TOKEN: test_cryptobot_token
          PROMETHEUS_ENABLED: 'false'
          PROMETHEUS_PROTECT: 'false'
          AVAILABLE_LANGUAGES: '["ru", "en"]'
        run: |
          pytest \
            tests/unit/test_main.py \
            -k "setup_sentry or loads_sentry_contract_from_environment or before_send_scrubs_sensitive_fields" \
            -v --tb=short

      - name: Start Telegram bot webhook smoke runtime
        working-directory: services/telegram-bot
        env:
          BOT_TOKEN: 1234567890:ABCdefGHIjklMNOpqrsTUVwxyz
          BOT_MODE: webhook
          ENVIRONMENT: staging
          SENTRY_DSN: https://telegram@example.com/1
          SENTRY_RELEASE: telegram-bot@${{ github.sha }}
          TELEGRAM_BOT_SKIP_NETWORK_CALLS: 'true'
          TELEGRAM_BOT_OBSERVABILITY_INTERNAL_SECRET: telegram-observability-secret
          WEBHOOK_URL: https://bot.test.cybervpn.local
          WEBHOOK_PATH: /webhook/telegram
          WEBHOOK_PORT: '8080'
          WEBHOOK_SECRET_TOKEN: webhook-secret
          BACKEND_API_URL: https://api.test.cybervpn.local
          BACKEND_API_KEY: test_api_key_12345
          CRYPTOBOT_TOKEN: test_cryptobot_token
          PROMETHEUS_ENABLED: 'false'
          PROMETHEUS_PROTECT: 'false'
          AVAILABLE_LANGUAGES: 'ru,en'
        run: |
          nohup python3 -m src.main > /tmp/telegram-bot-sentry-smoke.log 2>&1 &
          echo $! > /tmp/telegram-bot-sentry-smoke.pid

      - name: Run Telegram bot webhook runtime smoke
        working-directory: services/telegram-bot
        run: |
          python3 ../../scripts/http-smoke-check.py \
            --url http://127.0.0.1:8080/health \
            --expect-status 200 \
            --expect-json-field status=ok \
            --expect-json-field mode=webhook \
            --expect-json-field service=cybervpn-telegram-bot \
            --expect-json-field environment=staging \
            --summary-label "Telegram bot webhook health smoke"
          python3 ../../scripts/http-smoke-check.py \
            --url http://127.0.0.1:8080/observability/sentry-contract \
            --header "x-observability-secret: telegram-observability-secret" \
            --expect-status 200 \
            --expect-json-field runtime_surface=telegram-bot \
            --expect-json-field service=cybervpn-telegram-bot \
            --expect-json-field environment=staging \
            --expect-json-field release=telegram-bot@${{ github.sha }} \
            --expect-json-field dsn_configured=true \
            --expect-json-field bot_mode=webhook \
            --summary-label "Telegram bot Sentry runtime smoke"

      - name: Stop Telegram bot webhook smoke runtime
        if: always()
        run: |
          if [ -f /tmp/telegram-bot-sentry-smoke.pid ]; then
            kill "$(cat /tmp/telegram-bot-sentry-smoke.pid)" || true
          fi

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/telegram-bot
          file: services/telegram-bot/Dockerfile
          push: false
          tags: cybervpn-telegram-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  all-checks:
    name: All Telegram Bot Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, docker-build]
    if: always()
    steps:
      - name: Check all jobs
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          TEST_RESULT: ${{ needs.test.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
        run: |
          if [[ "$LINT_RESULT" != "success" ]] || \
             [[ "$TYPECHECK_RESULT" != "success" ]] || \
             [[ "$TEST_RESULT" != "success" ]] || \
             [[ "$DOCKER_RESULT" != "success" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All Telegram bot checks passed"
