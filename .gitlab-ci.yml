      STAGE1_RELEASE_TAG="${S2_RELEASE_TAG:-s2-ci-${CI_PIPELINE_IID}-${CI_COMMIT_SHORT_SHA}}" \
      bash scripts/deploy/stage1-gitlab-deploy.sh "${S2_DRY_RUN_SERVICES:-frontend}"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - docs/evidence/releases/ci-stage2/

stage1:limited-publication-preflight:
  stage: deploy
  image: alpine:3.20
  extends:
    - .rules_stage1_limited_publication
  environment:
    name: stage1/limited-public-beta
    action: prepare
  allow_failure: false
  before_script:
    - apk add --no-cache bash curl coreutils grep
  script:
    - mkdir -p docs/evidence/releases/ci-stage1
    - REPORT="docs/evidence/releases/ci-stage1/stage1-limited-publication-preflight-${CI_COMMIT_SHORT_SHA}.md"
    - |
      {
        echo "# Stage 1 Limited Publication Preflight"
        echo
        echo "Commit: \`${CI_COMMIT_SHA}\`"
        echo "Ref: \`${CI_COMMIT_REF_NAME}\`"
        echo "Pipeline: \`${CI_PIPELINE_URL}\`"
        echo "Checked at: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`"
        echo
        echo "## Endpoint Smoke"
        echo
        echo '```text'
      } > "$REPORT"
    - |
      for url in \
        "https://cyber-vpn.net/en-EN/status" \
        "https://cyber-vpn.net/ru-RU/privacy-policy" \
        "https://admin.cyber-vpn.net/ru-RU/login" \
        "https://api.cyber-vpn.net/healthz" \
        "https://cyber-vpn.org/en-EN/status" \
        "https://admin.cyber-vpn.org/ru-RU/login"
      do
        curl -fsS -o /dev/null -w "%{http_code} %{time_total} ${url}\n" "$url" | tee -a "$REPORT"
      done
    - |
      {
        echo '```'
        echo
        echo "## Launch Guard"
        echo
      } >> "$REPORT"
    - |
      latest_stabilization="$(ls -1 docs/evidence/releases/stage1-stabilization-*.md 2>/dev/null | sort | tail -1 || true)"
      if [ -n "$latest_stabilization" ]; then
        echo "Latest stabilization evidence: \`${latest_stabilization}\`" >> "$REPORT"
        if grep -q "NO-GO for external beta cohort expansion" "$latest_stabilization"; then
          echo >> "$REPORT"
          echo "External beta cohort remains NO-GO according to latest stabilization evidence." >> "$REPORT"
          if [ "${STAGE1_REQUIRE_BETA_GO:-false}" = "true" ]; then
            cat "$REPORT"
            exit 1
          fi
        fi
      else
        echo "No stabilization evidence file found." >> "$REPORT"
        if [ "${STAGE1_REQUIRE_BETA_GO:-false}" = "true" ]; then
          cat "$REPORT"
          exit 1
        fi
      fi
    - cat "$REPORT"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - docs/evidence/releases/ci-stage1/
