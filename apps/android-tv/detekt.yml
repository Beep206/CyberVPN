build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedFindingsReport'

style:
  TrailingWhitespace:
    active: true
  MaxLineLength:
    active: false

complexity:
  active: true
  TooManyFunctions:
    active: false
  CyclomaticComplexMethod:
    active: false
