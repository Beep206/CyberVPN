replicaCount: 2

image:
  repository: ghcr.io/REPLACE_ME_IMAGE_REPOSITORY/backend
  digest: sha256:REPLACE_ME_BACKEND_IMAGE_DIGEST
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-platform-workloads

serviceAccount:
  create: true
  name: ""

externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-apps
  targetName: backend-runtime
  extractKey: kv-apps/data/nonprod/platform/backend

service:
  enabled: true
  type: ClusterIP
  port: 8000
  targetPort: 8000

metrics:
  enabled: true
  servicePort: 9091
  containerPort: 9091
  serviceMonitor:
    enabled: true
    interval: 30s

pdb:
  enabled: true
  minAvailable: 1

migrationJob:
  enabled: true
  command:
    - alembic
    - upgrade
    - head

resources: {}
