---
control_plane_stack_environment: production
control_plane_stack_project_name: control-plane

control_plane_stack_release_name: "{{ control_plane_release_name | default('', true) }}"
control_plane_stack_backend_image: "{{ control_plane_release_images.backend | default('', true) }}"
control_plane_stack_worker_image: "{{ control_plane_release_images.worker | default('', true) }}"
control_plane_stack_helix_adapter_image: "{{ control_plane_release_images.helix_adapter | default('', true) }}"
control_plane_stack_enforce_immutable_images: true
control_plane_stack_registry_logins: >-
  {{
    [
      {
        'registry_url': 'ghcr.io',
        'username': vault_control_plane_registry_username | default(''),
        'password': vault_control_plane_registry_password | default(''),
        'reauthorize': false
      }
    ]
  }}

control_plane_stack_enable_remnawave: true
control_plane_stack_enable_postgres: true
control_plane_stack_enable_valkey: true
control_plane_stack_enable_db_backup: true
control_plane_stack_enable_backend: true
control_plane_stack_enable_worker: true
control_plane_stack_enable_scheduler: true
control_plane_stack_enable_helix_adapter: true

control_plane_public_base_url: https://panel.example.com
control_plane_panel_domain: panel.example.com
control_plane_subscription_domain: sub.example.com

control_plane_postgres_user: cybervpn
control_plane_postgres_db: cybervpn
control_plane_postgres_password: "{{ vault_control_plane_postgres_password }}"

control_plane_stack_remnawave_env: >-
  {{
    {
      'APP_PORT': '3000',
      'METRICS_PORT': '3001',
      'POSTGRES_USER': control_plane_postgres_user,
      'POSTGRES_PASSWORD': control_plane_postgres_password,
      'POSTGRES_DB': control_plane_postgres_db,
      'FRONT_END_DOMAIN': control_plane_panel_domain,
      'PANEL_DOMAIN': control_plane_panel_domain,
      'SUB_PUBLIC_DOMAIN': control_plane_subscription_domain,
      'HELIX_ENABLED': 'true',
      'HELIX_ADAPTER_PORT': control_plane_stack_helix_adapter_port | string,
      'HELIX_INTERNAL_AUTH_TOKEN': vault_control_plane_helix_internal_auth_token,
      'HELIX_REMNAWAVE_TOKEN': vault_control_plane_helix_remnawave_token,
      'JWT_AUTH_SECRET': vault_control_plane_remnawave_jwt_auth_secret,
      'JWT_API_TOKENS_SECRET': vault_control_plane_remnawave_jwt_api_tokens_secret,
      'METRICS_USER': vault_control_plane_remnawave_metrics_user,
      'METRICS_PASS': vault_control_plane_remnawave_metrics_pass
    } | combine(vault_control_plane_remnawave_env_extra | default({}))
  }}

control_plane_stack_backend_env: >-
  {{
    {
      'DATABASE_URL': 'postgresql+asyncpg://' ~ control_plane_postgres_user ~ ':' ~ control_plane_postgres_password ~ '@remnawave-db:5432/' ~ control_plane_postgres_db,
      'REDIS_URL': 'redis://remnawave-redis:6379/0',
      'REMNAWAVE_URL': 'http://remnawave:3000',
      'REMNAWAVE_TOKEN': vault_control_plane_backend_remnawave_token,
      'HELIX_ENABLED': 'true',
      'HELIX_ADAPTER_URL': 'http://helix-adapter:8088',
      'HELIX_ADAPTER_TOKEN': vault_control_plane_helix_internal_auth_token,
      'JWT_SECRET': vault_control_plane_backend_jwt_secret,
      'CRYPTOBOT_TOKEN': vault_control_plane_backend_cryptobot_token,
      'ENVIRONMENT': control_plane_stack_environment,
      'LOG_LEVEL': 'INFO',
      'CORS_ORIGINS': control_plane_public_base_url,
      'OAUTH_WEB_BASE_URL': control_plane_public_base_url,
      'SWAGGER_ENABLED': 'false',
      'DEBUG': 'false',
      'TOTP_ENCRYPTION_KEY': vault_control_plane_backend_totp_encryption_key,
      'OAUTH_TOKEN_ENCRYPTION_KEY': vault_control_plane_backend_oauth_token_encryption_key
    } | combine(vault_control_plane_backend_env_extra | default({}))
  }}

control_plane_stack_worker_env: >-
  {{
    {
      'DATABASE_URL': 'postgresql+asyncpg://' ~ control_plane_postgres_user ~ ':' ~ control_plane_postgres_password ~ '@remnawave-db:5432/' ~ control_plane_postgres_db,
      'REDIS_URL': 'redis://remnawave-redis:6379/0',
      'REMNAWAVE_URL': 'http://remnawave:3000',
      'REMNAWAVE_API_TOKEN': vault_control_plane_worker_remnawave_api_token,
      'HELIX_ENABLED': 'true',
      'HELIX_ADAPTER_URL': 'http://helix-adapter:8088',
      'HELIX_ADAPTER_TOKEN': vault_control_plane_helix_internal_auth_token,
      'TELEGRAM_BOT_TOKEN': vault_control_plane_worker_telegram_bot_token,
      'CRYPTOBOT_TOKEN': vault_control_plane_worker_cryptobot_token,
      'ADMIN_TELEGRAM_IDS': vault_control_plane_worker_admin_telegram_ids,
      'WORKER_CONCURRENCY': '2',
      'LOG_LEVEL': 'INFO',
      'METRICS_PORT': control_plane_stack_worker_metrics_port | string,
      'METRICS_PROTECT': 'false',
      'PROMETHEUS_MULTIPROC_DIR': '/tmp/prometheus-multiproc',
      'MAGIC_LINK_BASE_URL': control_plane_public_base_url
    } | combine(vault_control_plane_worker_env_extra | default({}))
  }}

control_plane_stack_scheduler_env: "{{ control_plane_stack_worker_env }}"

control_plane_stack_helix_adapter_env: >-
  {{
    {
      'ADAPTER_BIND_ADDR': '0.0.0.0:8088',
      'REMNAWAVE_URL': 'http://remnawave:3000',
      'REMNAWAVE_TOKEN': vault_control_plane_helix_adapter_remnawave_token,
      'DATABASE_URL': 'postgresql://' ~ control_plane_postgres_user ~ ':' ~ control_plane_postgres_password ~ '@remnawave-db:5432/' ~ control_plane_postgres_db,
      'DATABASE_MAX_CONNECTIONS': '10',
      'DATABASE_ACQUIRE_TIMEOUT_SECONDS': '5',
      'METRICS_PREFIX': control_plane_stack_helix_adapter_metrics_prefix,
      'INTERNAL_AUTH_TOKEN': vault_control_plane_helix_internal_auth_token,
      'MANIFEST_SIGNING_KEY': vault_control_plane_manifest_signing_key,
      'MANIFEST_SIGNING_KEY_ID': 'sig-key-production',
      'MANIFEST_TTL_SECONDS': '3600',
      'DEFAULT_ROLLOUT_CHANNEL': 'stable',
      'LOG_LEVEL': 'info'
    } | combine(vault_control_plane_helix_adapter_env_extra | default({}))
  }}

control_plane_stack_db_backup_env:
  POSTGRES_HOST: remnawave-db
  POSTGRES_DB: "{{ control_plane_postgres_db }}"
  POSTGRES_USER: "{{ control_plane_postgres_user }}"
  POSTGRES_PASSWORD: "{{ control_plane_postgres_password }}"
  POSTGRES_EXTRA_OPTS: --format=custom --compress=6
  SCHEDULE: "{{ control_plane_stack_db_backup_schedule }}"
  BACKUP_KEEP_DAYS: "{{ control_plane_stack_db_backup_keep_days | string }}"
  TZ: UTC
