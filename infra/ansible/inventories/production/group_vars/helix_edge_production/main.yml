helix_edge_control_port: 8091
helix_edge_transport_ports: []
helix_edge_assignment_poll_interval_seconds: 15
helix_edge_health_gate_timeout_seconds: 15
helix_edge_metrics_prefix: helix_node
helix_edge_log_level: info
helix_edge_allow_private_targets: false
helix_edge_canary_pause_seconds: 30
