---
helix_edge_image: ""
helix_edge_adapter_url: ""
helix_edge_adapter_token: "{{ vault_helix_edge_adapter_token }}"
helix_edge_node_id: "{{ inventory_hostname }}"
helix_edge_state_dir: /var/lib/helix-node
helix_edge_instance_id: "{{ inventory_hostname }}"
