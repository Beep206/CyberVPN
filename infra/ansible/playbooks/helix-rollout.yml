---
- name: Roll out Helix edge workload
  hosts: "{{ helix_edge_target_group | default('helix_edge_staging') }}"
  become: true
  gather_facts: true
  serial: 1
  max_fail_percentage: 0

  roles:
    - role: helix_edge
      vars:
        helix_edge_action: deploy

  post_tasks:
    - name: Helix | Pause after canary host
      ansible.builtin.pause:
        seconds: "{{ helix_edge_canary_pause_seconds }}"
        prompt: >-
          Canary host {{ inventory_hostname }} is healthy. Waiting before widening
          the Helix rollout to the next node.
      when:
        - play_hosts | length > 1
        - inventory_hostname == (play_hosts | first)
        - helix_edge_canary_pause_seconds | int > 0
