---
- name: Alloy | Validate previous config before rollback
  ansible.builtin.command:
    argv:
      - "{{ alloy_agent_binary_path }}"
      - validate
      - "{{ alloy_agent_previous_config_path }}"
  changed_when: false

- name: Alloy | Restore previous config
  ansible.builtin.copy:
    src: "{{ alloy_agent_previous_config_path }}"
    dest: "{{ alloy_agent_config_path }}"
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Alloy | Restart service after rollback
  ansible.builtin.systemd_service:
    name: "{{ alloy_agent_service_name }}"
    state: restarted

- import_tasks: verify.yml
