---
- name: Docker | Assert Ubuntu target
  ansible.builtin.assert:
    that:
      - ansible_distribution == "Ubuntu"
    fail_msg: "The docker role currently supports Ubuntu hosts only."

- name: Docker | Install repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Docker | Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Docker | Install Docker apt GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true

- name: Docker | Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_repo_arch_map.get(ansible_architecture, 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true
  vars:
    docker_repo_arch_map:
      x86_64: amd64
      aarch64: arm64
      armv7l: armhf
