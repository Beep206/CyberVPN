---
- name: Helix | Select rollback target
  ansible.builtin.set_fact:
    helix_edge_rollback_target: >-
      {{
        helix_edge_releases_dir ~ '/' ~ helix_edge_rollback_release_name
        if helix_edge_rollback_release_name | length > 0
        else helix_edge_previous_target
      }}

- name: Helix | Assert rollback target exists
  ansible.builtin.stat:
    path: "{{ helix_edge_rollback_target }}"
  register: helix_edge_rollback_target_stat

- name: Helix | Validate rollback target
  ansible.builtin.assert:
    that:
      - helix_edge_rollback_target | length > 0
      - helix_edge_rollback_target_stat.stat.exists
    fail_msg: >-
      No rollback target is available. Set helix_edge_rollback_release_name
      or deploy at least one previous successful release first.

- name: Helix | Point current symlink to rollback target
  ansible.builtin.file:
    state: link
    src: "{{ helix_edge_rollback_target }}"
    path: "{{ helix_edge_current_link }}"
    force: true
  when: helix_edge_current_target != helix_edge_rollback_target

- import_tasks: state.yml

- import_tasks: _compose_apply.yml

- import_tasks: verify.yml
