modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
  http_2xx_3xx_4xx:
    prober: http
    timeout: 10s
    http:
      method: GET
      follow_redirects: true
      preferred_ip_protocol: ip4
      valid_status_codes:
        - 200
        - 201
        - 202
        - 204
        - 301
        - 302
        - 303
        - 307
        - 308
        - 401
        - 403
        - 404
      valid_http_versions:
        - HTTP/1.1
        - HTTP/2.0
  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4
