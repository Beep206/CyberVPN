global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/worker_alerts.yml
  - /etc/prometheus/rules/api_alerts.yml
  - /etc/prometheus/rules/db_alerts.yml
  - /etc/prometheus/rules/redis_alerts.yml
  - /etc/prometheus/rules/infra_alerts.yml
  - /etc/prometheus/rules/auth_alerts.yml
  - /etc/prometheus/rules/miniapp_runtime_alerts.yml
  - /etc/prometheus/rules/helix_alerts.yml
  - /etc/prometheus/rules/alloy_edge_alerts.yml
  - /etc/prometheus/rules/partner_platform_alerts.yml
  - /etc/prometheus/rules/customer_growth_notification_alerts.yml
  - /etc/prometheus/rules/customer_growth_reporting_alerts.yml
  - /etc/prometheus/rules/nats_alerts.yml
  - /etc/prometheus/rules/control_plane_alerts.yml
  - /etc/prometheus/rules/stage1_dashboard_recording_rules.yml
  - /etc/prometheus/rules/stage1_alerts.yml
  - /etc/prometheus/rules/stage2_analytics_alerts.yml
  - /etc/prometheus/rules/stage3_partner_reseller_alerts.yml

scrape_configs:
  - job_name: 'cybervpn-local-backend'
    static_configs:
      - targets: ['host.docker.internal:9092']
        labels:
          optional_profile: 'true'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'remnawave'
    static_configs:
      - targets: ['remnawave:3001']
    metrics_path: /metrics
    basic_auth:
      username: admin
      password: metrics_local_password

  - job_name: 'cybervpn-worker'
    static_configs:
      - targets: ['cybervpn-worker:9091']
        labels:
          optional_profile: 'true'
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'cybervpn-telegram-bot'
    static_configs:
      - targets: ['cybervpn-telegram-bot:8080']
        labels:
          optional_profile: 'true'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'helix-adapter'
    static_configs:
      - targets: ['helix-adapter:8088']
        labels:
          optional_profile: 'true'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'helix-node'
    static_configs:
      - targets:
          - 'helix-node-lab:8091'
          - 'helix-node-lab-02:8091'
        labels:
          optional_profile: 'true'
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'alloy-edge'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/alloy-*.json
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'nats-exporter'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/nats-*.json
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'alloy-control-plane'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/control-plane-alloy-*.json
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'openbao'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/openbao-*.json
    scheme: https
    metrics_path: /v1/sys/metrics
    params:
      format:
        - prometheus
    tls_config:
      insecure_skip_verify: true
    scrape_interval: 15s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: 'stage1-public-web'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/stage1-public-web.json
    metrics_path: /probe
    params:
      module: [http_2xx]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s

  - job_name: 'stage1-vpn-node-tcp'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/stage1-vpn-node-tcp.json
    metrics_path: /probe
    params:
      module: [tcp_connect]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s

  - job_name: 'stage2-public-endpoints'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/stage2-public-endpoints.json
    metrics_path: /probe
    params:
      module: [http_2xx]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s

  - job_name: 'stage2-subscription-route'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/stage2-subscription-route.json
    metrics_path: /probe
    params:
      module: [http_2xx_3xx_4xx]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s

  - job_name: 'stage2-vpn-node-tcp'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/stage2-vpn-node-tcp.json
    metrics_path: /probe
    params:
      module: [tcp_connect]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s

  - job_name: 'stage3-storefront-endpoints'
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/stage3-storefront-endpoints.json
    metrics_path: /probe
    params:
      module: [http_2xx_3xx_4xx]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
    scrape_interval: 30s
