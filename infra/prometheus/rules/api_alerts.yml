groups:
  - name: cybervpn_remnawave_alerts
    interval: 30s
    rules:
      - alert: RemnawaveDown
        expr: up{job="remnawave"} == 0
        for: 3m
        labels:
          severity: critical
          service: remnawave
        annotations:
          summary: "Remnawave metrics target is down"
          description: "Prometheus cannot scrape Remnawave metrics for more than 3 minutes."

      - alert: RemnawaveApiHeapCritical
        expr: max(100 * remnawave_process_heap_used_bytes{job="remnawave",instance_name="api"} / clamp_min(remnawave_process_heap_total_bytes{job="remnawave",instance_name="api"}, 1)) > 95
        for: 5m
        labels:
          severity: critical
          service: remnawave
        annotations:
          summary: "Remnawave API heap usage is critical"
          description: "Heap usage on Remnawave API is {{ $value }}% for more than 5 minutes."

      - alert: RemnawaveApiHeapHigh
        expr: max(100 * remnawave_process_heap_used_bytes{job="remnawave",instance_name="api"} / clamp_min(remnawave_process_heap_total_bytes{job="remnawave",instance_name="api"}, 1)) > 90
        for: 15m
        labels:
          severity: warning
          service: remnawave
        annotations:
          summary: "Remnawave API heap usage is high"
          description: "Heap usage on Remnawave API is {{ $value }}% for more than 15 minutes."

      - alert: RemnawaveApiEventLoopHigh
        expr: max(remnawave_process_event_loop_p99_ms{job="remnawave",instance_name="api"}) > 100
        for: 10m
        labels:
          severity: warning
          service: remnawave
        annotations:
          summary: "Remnawave API event loop delay is elevated"
          description: "P99 event loop delay on the Remnawave API process is {{ $value }} ms for more than 10 minutes."

      - alert: RemnawaveApiEventLoopCritical
        expr: max(remnawave_process_event_loop_p99_ms{job="remnawave",instance_name="api"}) > 250
        for: 5m
        labels:
          severity: critical
          service: remnawave
        annotations:
          summary: "Remnawave API event loop delay is critical"
          description: "P99 event loop delay on the Remnawave API process is {{ $value }} ms for more than 5 minutes."

      - alert: RemnawaveEventLoopLagHigh
        expr: max(remnawave_process_event_loop_delay_ms{job="remnawave"}) > 75
        for: 10m
        labels:
          severity: warning
          service: remnawave
        annotations:
          summary: "Remnawave event loop lag is high"
          description: "Mean event loop delay is {{ $value }} ms on {{ $labels.instance_name }}."

      - alert: RemnawaveNodeDisconnected
        expr: remnawave_node_status{job="remnawave"} == 0
        for: 5m
        labels:
          severity: warning
          service: remnawave
        annotations:
          summary: "A Remnawave node is disconnected"
          description: "Node {{ $labels.node_name }} has been disconnected for more than 5 minutes."

      - alert: RemnawaveNoHealthyNodes
        expr: sum(remnawave_node_status{job="remnawave"}) == 0
        for: 2m
        labels:
          severity: critical
          service: remnawave
        annotations:
          summary: "No healthy Remnawave nodes"
          description: "All Remnawave nodes are reported offline."
