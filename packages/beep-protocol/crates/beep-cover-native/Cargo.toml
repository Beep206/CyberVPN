[package]
name = "beep-cover-native"
version = "0.1.0"
edition = "2021"
description = "Native UDP fast-path transport profile for Beep VPN protocol"

[dependencies]
beep-transport = { path = "../beep-transport" }
bytes = "1.5"
tokio = { version = "1.34", features = ["net", "rt", "macros"] }
thiserror = "2"
tracing = "0.1"
