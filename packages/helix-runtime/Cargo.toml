[package]
name = "helix-runtime"
version = "0.1.0"
edition = "2021"
description = "Shared CyberVPN Helix session runtime"

[dependencies]
aes-gcm = "0.10"
hmac = "0.12"
postcard = { version = "1.1", features = ["use-std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tokio = { version = "1", features = ["io-util", "macros", "net", "rt", "sync", "time"] }
uuid = { version = "1", features = ["serde", "v4"] }
