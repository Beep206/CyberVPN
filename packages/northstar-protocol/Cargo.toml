[workspace]
resolver = "2"
members = [
    "crates/ns-auth",
    "crates/ns-bridge-api",
    "crates/ns-bridge-domain",
    "crates/ns-carrier-h3",
    "crates/ns-client-inbound",
    "crates/ns-client-runtime",
    "crates/ns-core",
    "crates/ns-gateway-runtime",
    "crates/ns-manifest",
    "crates/ns-observability",
    "crates/ns-policy",
    "crates/ns-remnawave-adapter",
    "crates/ns-session",
    "crates/ns-storage",
    "crates/ns-testkit",
    "crates/ns-wire",
    "apps/ns-bridge",
    "apps/ns-clientd",
    "apps/ns-gatewayd",
    "apps/nsctl",
]
default-members = [
    "apps/ns-bridge",
    "apps/ns-clientd",
    "apps/ns-gatewayd",
    "apps/nsctl",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
rust-version = "1.85"
publish = false

[workspace.dependencies]
anyhow = "1.0.100"
async-trait = "0.1.89"
axum = { version = "0.8.8", features = ["http1", "json", "macros", "tokio"] }
base64 = "0.22.1"
base64ct = { version = "1.8.3", features = ["alloc"] }
bytes = "1.11.1"
clap = { version = "4.6.0", features = ["derive"] }
ed25519-dalek = { version = "2.2.0", features = ["pkcs8"] }
h3 = "0.0.8"
h3-datagram = "0.0.2"
h3-quinn = "0.0.10"
hex = "0.4.3"
http = "1.4.0"
jsonwebtoken = { version = "10.3.0", features = ["rust_crypto", "use_pem"] }
once_cell = "1.21.3"
parking_lot = "0.12.5"
quinn = { version = "0.11.9", default-features = false, features = ["runtime-tokio", "rustls-ring", "log"] }
rand = "0.8.5"
rcgen = "0.14.5"
reqwest = { version = "0.12.24", default-features = false, features = ["http2", "json", "rustls-tls"] }
rusqlite = { version = "0.37.0", features = ["bundled"] }
rustls = { version = "0.23.37", default-features = false, features = ["ring", "std"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_jcs = "0.2.0"
serde_json = "1.0.149"
sha2 = "0.10.9"
thiserror = "2.0.18"
time = { version = "0.3.45", features = ["formatting", "parsing", "serde", "macros"] }
tokio = { version = "1.50.0", features = ["macros", "rt-multi-thread", "signal", "sync", "net", "time", "fs", "io-util"] }
toml = "0.8.23"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter", "fmt", "json"] }
url = { version = "2.5.8", features = ["serde"] }
uuid = { version = "1.23.0", features = ["serde", "v4"] }
zeroize = "1.8.2"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"
