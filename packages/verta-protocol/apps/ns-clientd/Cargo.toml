ns-core = { path = "../../crates/ns-core" }
ns-manifest = { path = "../../crates/ns-manifest" }
ns-observability = { path = "../../crates/ns-observability" }
serde_json.workspace = true
time.workspace = true
tokio.workspace = true
tracing.workspace = true
url.workspace = true

[dev-dependencies]
ns-session = { path = "../../crates/ns-session" }
ns-testkit = { path = "../../crates/ns-testkit" }
