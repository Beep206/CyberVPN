apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cybervpn-backend
  namespace: platform-apps
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: cybervpn-backend-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/REPLACE_ME_IMAGE_REPOSITORY/backend
      digest: sha256:REPLACE_ME_BACKEND_IMAGE_DIGEST
    externalSecret:
      targetName: backend-runtime
      extractKey: kv-apps/data/nonprod/platform/backend
    service:
      enabled: true
      type: ClusterIP
      port: 8000
      targetPort: 8000
    metrics:
      enabled: true
      servicePort: 9091
      containerPort: 9091
      serviceMonitor:
        enabled: true
        interval: 30s
    pdb:
      enabled: true
      minAvailable: 1
    migrationJob:
      enabled: true
      command:
        - alembic
        - upgrade
        - head
